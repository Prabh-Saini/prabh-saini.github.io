<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title description">
  <title id="title">Blueprint to reality wide placeholder</title>
  <desc id="description">A cinematic neutral placeholder where precise vehicle-like linework transitions into sculpted metallic forms and warm light.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0c1b24"/>
      <stop offset="0.48" stop-color="#234a5a"/>
      <stop offset="0.67" stop-color="#7f8d8a"/>
      <stop offset="1" stop-color="#d9d1c5"/>
    </linearGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0e9df"/>
      <stop offset="0.42" stop-color="#abb2ad"/>
      <stop offset="0.72" stop-color="#5b7072"/>
      <stop offset="1" stop-color="#263b44"/>
