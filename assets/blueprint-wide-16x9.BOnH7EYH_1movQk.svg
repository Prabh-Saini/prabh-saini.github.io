    <circle cx="836" cy="636" r="91"/>
    <circle cx="836" cy="636" r="48" stroke-dasharray="9 11"/>
    <path d="M92 592h963M471 356v311M151 706h867" stroke-width="1" stroke-dasharray="8 13"/>
