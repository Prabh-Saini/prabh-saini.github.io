<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1400" viewBox="0 0 1400 1400" role="img" aria-labelledby="title description">
  <title id="title">Blueprint to reality square placeholder</title>
  <desc id="description">A polished square placeholder blending measured product geometry into tactile neutral materials.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e202a"/>
      <stop offset="0.47" stop-color="#2c5362"/>
      <stop offset="0.67" stop-color="#87948f"/>
      <stop offset="1" stop-color="#ddd4c7"/>
    </linearGradient>
    <linearGradient id="object" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1e9dc"/>
      <stop offset="0.42" stop-color="#b0b5ae"/>
      <stop offset="0.78" stop-color="#617272"/>
      <stop offset="1" stop-color="#344a50"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#fff1d7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fff1d7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse">
      <path d="M70 0H0V70" fill="none" stroke="#9edce5" stroke-opacity="0.15"/>
      <circle cx="0" cy="0" r="3" fill="#b7e8ed" fill-opacity="0.18"/>
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="28"/>
      <feOffset dy="32"/>
      <feColorMatrix values="0 0 0 0 0.02 0 0 0 0 0.05 0 0 0 0 0.07 0 0 0 .4 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="1400" fill="url(#background)"/>
  <rect width="790" height="1400" fill="url(#grid)"/>
  <g fill="none" stroke="#b7ebef" stroke-width="3" stroke-opacity="0.67">
    <rect x="138" y="322" width="486" height="690" rx="104"/>
    <rect x="190" y="374" width="382" height="586" rx="72" stroke-dasharray="12 14"/>
    <circle cx="381" cy="667" r="122"/>
    <circle cx="381" cy="667" r="58"/>
    <path d="M381 242v850M58 667h646M110 1064h542M110 1090h542" stroke-width="1" stroke-dasharray="8 13"/>
    <path d="M180 274 138 322M582 274l42 48M180 1060l-42-48M582 1060l42-48"/>
  </g>
  <circle cx="1040" cy="584" r="360" fill="url(#glow)"/>
  <g filter="url(#shadow)">
    <rect x="690" y="344" width="514" height="690" rx="112" fill="url(#object)"/>
    <rect x="750" y="404" width="394" height="570" rx="74" fill="#d9d4ca" fill-opacity="0.36"/>
    <circle cx="947" cy="689" r="132" fill="#344950"/>
    <circle cx="947" cy="689" r="70" fill="#aab1ab"/>
    <circle cx="947" cy="689" r="24" fill="#eee6da"/>
  </g>
  <path d="M700 92v1216" stroke="#f1faf6" stroke-opacity="0.6" stroke-dasharray="5 18"/>
  <g fill="#eff9f6" font-family="Arial, sans-serif" letter-spacing="5">
    <text x="92" y="102" font-size="22">MEASURE / MATERIAL</text>
    <text x="92" y="1302" font-size="16" fill-opacity="0.72">1:1 PLACEHOLDER &#8212; REPLACE BEFORE LAUNCH</text>
  </g>
</svg>
